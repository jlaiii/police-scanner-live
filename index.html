<title>Police Scanner Live</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{background:#0f0f23;color:#e0e0e0;line-height:1.4}
header{background:#1a1a2e;padding:1rem 1.5rem;text-align:center;border-bottom:1px solid #16213e}
header h1{font-size:1.5rem;color:#fff;margin-bottom:0.25rem}
header p{color:#a0aec0;font-size:0.85rem}
.container{max-width:1400px;margin:0 auto;padding:1rem;display:grid;grid-template-columns:320px 1fr;gap:1rem}
@media(max-width:900px){.container{grid-template-columns:1fr}}
.feeds-panel{background:#1a1a2e;border-radius:12px;border:1px solid #16213e;overflow:hidden;display:flex;flex-direction:column;height:80vh}
.panel-header{padding:1rem;background:#16213e;border-bottom:1px solid #0f3460}
.panel-header h2{font-size:1.1rem;color:#fff;margin-bottom:0.5rem}
#search{width:100%;padding:0.6rem 0.8rem;background:#0f0f23;border:1px solid #0f3460;border-radius:8px;color:#e0e0e0;font-size:0.85rem;outline:none}
.feeds-list{flex:1;overflow-y:auto;padding:0.5rem}
.feed-item{padding:0.75rem;margin-bottom:0.5rem;background:#0f0f23;border-radius:10px;border:1px solid #16213e;cursor:pointer;transition:all 0.2s}
.feed-item:hover{background:#1e1e3f;border-color:#2d3561;transform:translateX(3px)}
.feed-item.playing{border-left:4px solid #4cc9f0}
.feed-item .feed-name{font-weight:600;color:#fff;font-size:0.9rem}
.feed-item .feed-meta{font-size:0.75rem;color:#8892b0;margin-top:0.25rem}
.feed-item .feed-tags{margin-top:0.4rem;display:flex;gap:0.3rem;flex-wrap:wrap}
.tag{font-size:0.65rem;padding:0.2rem 0.5rem;border-radius:6px;text-transform:uppercase;font-weight:700;letter-spacing:0.02em}
.map-container{background:#1a1a2e;border-radius:12px;border:1px solid #16213e;overflow:hidden;height:80vh;position:relative}
#map{height:100%;width:100%;background:#0a0a1a}
.leaflet-popup-content-wrapper{background:#1a1a2e;color:#e0e0e0;border:1px solid #0f3460;border-radius:10px}
.leaflet-popup-tip{background:#1a1a2e}
.player-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:1px solid #16213e;padding:0.75rem 1rem;display:flex;align-items:center;gap:1rem;z-index:10000;backdrop-filter:blur(10px)}
.player-info{display:flex;align-items:center;gap:0.6rem;flex:1;min-width:0}
.pulse{width:12px;height:12px;background:#ff4757;border-radius:50%;animation:pulse 1.5s infinite;display:none}
.pulse.active{display:block}
@keyframes pulse{0%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(255,71,87,0.7)}70%{transform:scale(1);box-shadow:0 0 0 10px rgba(255,71,87,0)}100%{transform:scale(0.95);box-shadow:0 0 0 0 rgba(255,71,87,0)}}
#currentFeedName{font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#currentFeedMeta{color:#a0aec0;font-size:0.8rem}
.controls{display:flex;gap:0.6rem;align-items:center}
button.control-btn{padding:0.5rem 1.2rem;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:0.85rem;transition:all 0.2s}
button.control-btn:hover{transform:translateY(-1px);opacity:0.9}
.play-btn{background:#4361ee;color:#fff}
.stop-btn{background:#ff4757;color:#fff}
.volume-slider{width:100px}
filters{display:flex;gap:0.4rem;margin-top:0.5rem;flex-wrap:wrap}
.filter-tag{cursor:pointer;font-size:0.7rem;padding:0.3rem 0.6rem;border-radius:6px;background:#0f0f23;border:1px solid #16213e;color:#a0aec0;transition:all 0.2s}
.filter-tag:hover,.filter-tag.active{background:#2d3561;border-color:#4cc9f0;color:#fff}
.info-panel{position:absolute;top:10px;right:10px;width:280px;background:rgba(26,26,46,0.95);border:1px solid #16213e;border-radius:10px;padding:1rem;z-index:1000;max-height:60vh;overflow-y:auto;backdrop-filter:blur(8px)}
.info-panel h3{color:#fff;font-size:1rem;margin-bottom:0.5rem;border-bottom:1px solid #16213e;padding-bottom:0.5rem}
.info-panel p{color:#a0aec0;font-size:0.85rem;margin-bottom:0.75rem}
.info-panel button{background:#4361ee;color:#fff;border:none;padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-weight:600}
.hidden{display:none}
</style>
</head>

  {id:'osceola',name:'Osceola County Public Safety',location:'Kissimmee, FL',url:'https://broadcastify.cdnstream1.com/42102',lat:28.292,lon:-81.4076,type:'dispatch',status:'online',listeners:0},
  {id:'sarasota-fire',name:'Sarasota County Fire',location:'Sarasota, FL',url:'https://broadcastify.cdnstream1.com/18152',lat:27.3364,lon:-82.5307,type:'fire',status:'online',listeners:0},
  {id:'gainesville',name:'Gainesville Police/Alachua Fire',location:'Gainesville, FL',url:'https://broadcastify.cdnstream1.com/39282',lat:29.6516,lon:-82.3248,type:'dispatch',status:'online',listeners:0},
  {id:'perth-fire',name:'Perth Fire and Rescue',location:'Perth, Australia',url:'https://stream.warsug.info/WARSUG',lat:-31.9505,lon:115.8605,type:'fire',status:'online',listeners:0},
  {id:'colton',name:'Colton Police Scanner',location:'Colton, UT',url:'http://64.77.247.181:50/stream',lat:40.2505,lon:-112.2855,type:'police',status:'online',listeners:0},
  {id:'bradley',name:'Bradley County Sheriff/Cleveland PD',location:'Cleveland, TN',url:'https://broadcastify.cdnstream1.com/9119',lat:35.1595,lon:-84.8771,type:'dispatch',status:'online',listeners:0},
  {id:'gratiot',name:'Gratiot County Police/Fire',location:'Alma, MI',url:'https://broadcastify.cdnstream1.com/5094',lat:43.3789,lon:-84.6597,type:'dispatch',status:'online',listeners:0},
  {id:'calumet',name:'Calumet County Fire/First Responders',location:'Chilton, WI',url:'https://broadcastify.cdnstream1.com/44207',lat:44.0289,lon:-88.1629,type:'fire',status:'online',listeners:0},
  {id:'centralia',name:'Centralia Police/Fire/EMS',location:'Centralia, IL',url:'https://broadcastify.cdnstream1.com/36866',lat:38.525,lon:-89.1334,type:'dispatch',status:'online',listeners:0},
  {id:'tazewell',name:'Tazewell Sheriff/Pekin Police',location:'Pekin, IL',url:'https://broadcastify.cdnstream1.com/44334',lat:40.5675,lon:-89.6407,type:'police',status:'online',listeners:0},
  {id:'salem-il',name:'Salem Fire/Surrounding PD/EMS',location:'Salem, IL',url:'https://broadcastify.cdnstream1.com/33915',lat:38.627,lon:-88.9456,type:'dispatch',status:'online',listeners:0}
];

const TYPES = {police:"#ff4757",fire:"#ff7f50",dispatch:"#4169e1",ems:"#2ed573",default:"#a29bfe"};
let currentFeedId = null;
let isPlaying = false;
let audioCtx = null;
const audioEl = document.createElement("audio");
audioEl.crossOrigin = "anonymous";
audioEl.preload = "none";
document.body.appendChild(audioEl);

const map = L.map("map").setView(""" + str([39.8283, -98.5795]) + """, 4);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains: "abcd", maxZoom: 19
}).addTo(map);

const markers = {};
const feedItems = {};

function getColor(type){ return TYPES[type] || TYPES.default; }

function renderFeeds(filterText="", typeFilter=null) {
  const list = document.getElementById("feedsList");
  list.innerHTML = "";
  const terms = filterText.toLowerCase().split(/\s+/).filter(Boolean);
  for(const f of feeds){
    if(typeFilter && f.type !== typeFilter) continue;
    const hay = (f.name+" "+f.location+" "+f.type).toLowerCase();
    if(terms.length && !terms.every(t=>hay.includes(t))) continue;
    const color = getColor(f.type);
    const div = document.createElement("div");
    div.className = "feed-item" + (currentFeedId===f.id ? " playing" : "");
    div.dataset.id = f.id;
    div.innerHTML = '<div class="feed-name">'+escHtml(f.name)+'</div>'+
      '<div class="feed-meta">'+escHtml(f.location)+' &bull; '+f.status+'</div>'+
      '<div class="feed-tags"><span class="tag" style="background:'+color+'22;color:'+color+'">'+f.type.toUpperCase()+'</span></div>';
    div.addEventListener("click", ()=>playFeed(f.id));
    list.appendChild(div);
    feedItems[f.id] = div;
  }
}

function escHtml(s){
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function showInfo(id){
  const f = feeds.find(x=>x.id===id);
  if(!f) return;
  const color = getColor(f.type);
  const panel = document.getElementById("infoPanel");
  panel.innerHTML = '<h3>'+escHtml(f.name)+'</h3><p><strong>Location:</strong> '+escHtml(f.location)+'</p>'+
    '<p><strong>Type:</strong> <span style="color:'+color+'">'+f.type.toUpperCase()+'</span></p>'+
    '<p><strong>Status:</strong> '+f.status+'</p>'+
    '<p><strong>Listeners:</strong> '+f.listeners+'</p>'+
    '<button data-action="play" data-id="'+escHtml(f.id)+'">PLAY FEED</button>';
  panel.querySelector('button[data-action="play"]').addEventListener("click", ()=>playFeed(f.id));
}

function playFeed(id){
  const f = feeds.find(x=>x.id===id);
  if(!f) return;
  if(currentFeedId && feedItems[currentFeedId]) feedItems[currentFeedId].classList.remove("playing");
  currentFeedId = id;
  if(feedItems[id]) feedItems[id].classList.add("playing");
  document.getElementById("currentFeedName").textContent = f.name;
  document.getElementById("currentFeedMeta").textContent = f.location + " • " + f.type.toUpperCase() + " • " + f.listeners + " listeners";
  document.getElementById("pulse").classList.add("active");
  showInfo(id);
  audioEl.src = f.url;
  audioEl.load();
  const promise = audioEl.play();
  if(promise && promise.then){
    promise.then(()=>{ isPlaying = true; updatePlayBtn(); })
          .catch(e=>{ console.error("Play error:",e); isPlaying = false; updatePlayBtn(); });
  } else { isPlaying = true; updatePlayBtn(); }
}

function stopFeed(){
  audioEl.pause();
  audioEl.src = "";
  if(currentFeedId && feedItems[currentFeedId]) feedItems[currentFeedId].classList.remove("playing");
  currentFeedId = null;
  isPlaying = false;
  document.getElementById("currentFeedName").textContent = "Select a feed to start listening";
  document.getElementById("currentFeedMeta").textContent = "";
  document.getElementById("pulse").classList.remove("active");
  updatePlayBtn();
}

function togglePlay(){
  if(!currentFeedId) return;
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  if(isPlaying){
    audioEl.pause();
    isPlaying = false;
  } else {
    const promise = audioEl.play();
    if(promise && promise.then) promise.then(()=>{isPlaying=true;updatePlayBtn();}).catch(()=>{isPlaying=false;updatePlayBtn();});
    else isPlaying = true;
  }
  updatePlayBtn();
}

function updatePlayBtn(){
  const btn = document.getElementById("playPauseBtn");
  btn.disabled = !currentFeedId;
  btn.textContent = isPlaying ? "PAUSE" : "PLAY";
  btn.className = "control-btn " + (isPlaying ? "stop-btn" : "play-btn");
}

document.getElementById("playPauseBtn").addEventListener("click", togglePlay);
document.getElementById("stopBtn").addEventListener("click", stopFeed);
document.getElementById("volume").addEventListener("input", e=>{ audioEl.volume = parseFloat(e.target.value); });

const searchEl = document.getElementById("search");
searchEl.addEventListener("input", ()=>renderFeeds(searchEl.value, currentTypeFilter));

let currentTypeFilter = null;
function buildFilters(){
  const types = [...new Set(feeds.map(f=>f.type))].sort();
  const wrap = document.getElementById("filters");
  wrap.innerHTML = "";
  const all = document.createElement("span");
  all.className = "filter-tag active";
  all.textContent = "ALL";
  all.addEventListener("click", ()=>{ currentTypeFilter=null; updateFilterTags(); renderFeeds(searchEl.value, null); });
  wrap.appendChild(all);
  for(const t of types){
    const span = document.createElement("span");
    span.className = "filter-tag";
    span.textContent = t.toUpperCase();
    span.addEventListener("click", ()=>{ currentTypeFilter=t; updateFilterTags(); renderFeeds(searchEl.value, t); });
    wrap.appendChild(span);
  }
}
function updateFilterTags(){
  const all = document.getElementById("filters").children;
  for(let i=0;i<all.length;i++){
    const t = all[i].textContent.toLowerCase();
    all[i].classList.toggle("active", (t==="all" && !currentTypeFilter) || t===currentTypeFilter);
  }
}

// Build markers
for(const f of feeds){
  const color = getColor(f.type);
  const m = L.circleMarker([f.lat, f.lon], {
    radius: 6, fillColor: color, color: "#fff", weight: 1.5, opacity: 1, fillOpacity: 0.9
  }).addTo(map);
  const popup = document.createElement("div");
  popup.innerHTML = '<strong>'+escHtml(f.name)+'</strong><br><span style="color:#aaa">'+escHtml(f.location)+'</span>';
  const btn = document.createElement("button");
  btn.textContent = "PLAY";
  btn.style.cssText = "margin-top:8px;padding:6px 12px;background:"+color+";border:none;border-radius:6px;color:#fff;font-weight:600;cursor:pointer;font-size:0.75rem";
  btn.addEventListener("click", ()=>playFeed(f.id));
  popup.appendChild(document.createElement("br"));
  popup.appendChild(btn);
  m.bindPopup(popup);
  markers[f.id] = m;
}

buildFilters();
renderFeeds();
showInfo(feeds[0] ? feeds[0].id : null);

// Clicking a marker updates info panel
map.on("popupopen", e=>{
  const id = Object.keys(markers).find(k=>markers[k]===e.popup._source);
  if(id) showInfo(id);
});
</script>
