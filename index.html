    <style>
:root{--bg:#07070d;--surface:#0f0f18;--surface-hover:#16162a;--border:#1e1e3e;--border-active:#33334d;--text:#e8e8f2;--text-secondary:#9ca3af;--text-muted:#6b7280;--accent:#ef4444;--accent-dim:rgba(239,68,68,.1);--accent-glow:rgba(239,68,68,.3);--blue:#3b82f6;--blue-dim:rgba(59,130,246,.1);--green:#22c55e;--green-dim:rgba(34,197,94,.1);--orange:#f97316;--orange-dim:rgba(249,115,22,.1);--font:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.app{display:flex;height:100vh;width:100vw}
.sidebar{width:380px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:1000;transition:transform .25s cubic-bezier(.4,0,.2,1)}
.sidebar.hidden{transform:translateX(-100%);position:absolute}
.sidebar.mobile-hidden{transform:translateX(-100%)}
.sidebar.mobile-visible{transform:translateX(0);position:fixed;height:100vh;width:85vw;max-width:380px}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h1{font-size:1.25rem;font-weight:800;display:flex;align-items:center;gap:10px;letter-spacing:-.02em}
.sidebar-header p{font-size:.8rem;color:var(--text-muted);margin-top:4px}
.live-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:600;color:var(--green);margin-top:8px;padding:3px 10px;border-radius:20px;background:var(--green-dim);border:1px solid rgba(34,197,94,.2)}
.live-badge .pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-live 2s infinite}
@keyframes pulse-live{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.search-box{padding:12px 20px;border-bottom:1px solid var(--border);position:relative}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;outline:none;font-family:var(--font)}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.search-box input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:32px;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--text-muted)}
.filters{display:flex;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:.8rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
.filter-chip:hover{border-color:var(--border-active);color:var(--text)}
.filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.feed-list{flex:1;overflow-y:auto;padding:8px 12px}
.feed-group-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:12px 8px 6px}
.feed-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:2px;border:1px solid transparent}
.feed-item:hover{background:var(--surface-hover);border-color:var(--border)}
.feed-item.active{background:var(--accent-dim);border-color:var(--accent)}
.feed-item.playing{background:linear-gradient(135deg,var(--accent-dim),var(--blue-dim));border-color:var(--accent)}
.feed-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;font-weight:700;font-family:var(--font-mono);color:white}
.feed-icon.police{background:rgba(239,68,68,.2);color:#ef4444}
.feed-icon.fire{background:rgba(249,115,22,.2);color:#f97316}
.feed-icon.ems{background:rgba(34,197,94,.2);color:#22c55e}
.feed-icon.dispatch{background:rgba(59,130,246,.2);color:#3b82f6}
.feed-info{flex:1;min-width:0}
.feed-name{font-weight:600;font-size:.88rem}
.feed-meta{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.feed-status{font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0}
.feed-status.online{background:var(--green-dim);color:var(--green)}
.feed-status.playing{background:var(--accent-dim);color:var(--accent);animation:pulse-live 2s infinite}
.now-playing{padding:16px 20px;border-top:1px solid var(--border);background:linear-gradient(135deg,var(--accent-dim),transparent)}
.now-playing-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px}
.now-playing-title{font-weight:600;font-size:.9rem;margin-bottom:8px}
.audio-controls{display:flex;align-items:center;gap:10px}
.audio-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--accent);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;transition:all .2s}
.audio-btn:hover{transform:scale(1.1)}
.audio-btn.stop{background:var(--text-muted)}
.viz-container{height:70px;background:rgba(0,0,0,.3);border-radius:8px;margin-top:10px;padding:5px 10px;display:flex;align-items:flex-end;justify-content:center;gap:3px;overflow:hidden}
.viz-bar{width:6px;border-radius:2px;background:linear-gradient(180deg,var(--accent),var(--orange));transition:height .05s ease-out;min-height:2px;opacity:.85}
.volume-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.main{flex:1;position:relative}
#map{width:100%;height:100%;background:#0d1117}
.sidebar-toggle{position:absolute;left:400px;top:16px;z-index:1001;width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:left .25s}
.sidebar-toggle.collapsed{left:16px}
.top-bar{position:absolute;top:16px;right:16px;z-index:500;display:flex;gap:6px}
.top-btn{padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.top-btn:hover{border-color:var(--border-active);color:var(--text)}
.top-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.info-panel{position:absolute;bottom:16px;right:16px;width:360px;max-height:calc(100vh - 100px);background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;z-index:500;backdrop-filter:blur(12px);display:none;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.info-panel.visible{display:flex}
.info-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:start;justify-content:space-between;background:linear-gradient(135deg,var(--accent-dim),transparent)}
.info-header h2{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.info-close{background:none;border:none;color:var(--text-muted);font-size:1.2rem;cursor:pointer;padding:0 0 0 12px}
.info-body{overflow-y:auto;padding:16px 20px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text-muted)}
.info-value{font-weight:600;font-family:var(--font-mono)}
.play-btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:10px;color:white;font-weight:600;cursor:pointer;margin-top:12px;transition:all .2s;text-transform:uppercase;letter-spacing:.05em;font-size:.8rem}
.play-btn:hover{transform:translateY(-2px);filter:brightness(1.1)}
.leaflet-popup-content-wrapper{background:var(--surface) !important;border:1px solid var(--border) !important;border-radius:12px !important;color:var(--text) !important;font-family:var(--font) !important}
.leaflet-popup-tip{background:var(--surface) !important;border:1px solid var(--border) !important}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-active)}
@media(max-width:768px){
.sidebar{position:fixed;height:100vh;width:85vw;max-width:380px}
.sidebar-toggle{left:16px !important;top:16px;z-index:1002;width:44px;height:44px}
.top-bar{top:auto;bottom:16px;right:50%;transform:translateX(50%);flex-wrap:wrap;justify-content:center}
.info-panel{width:calc(100% - 32px);left:16px;right:16px;bottom:70px;max-height:55vh}
}
    </style>
</head>

    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Scanner Live</h1>
                <p>Public safety radio intelligence</p>
                <div class="live-badge"><div class="pulse"></div> <span id="feed-count">0</span> Live Feeds</div>
            </div>
            <div class="search-box">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="feed-search" placeholder="Search feeds by city, state..." oninput="filterFeeds()">
            </div>
            <div class="filters" id="filters">
                <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</button>
                <button class="filter-chip" data-filter="police" onclick="setFilter('police')">Police</button>
                <button class="filter-chip" data-filter="fire" onclick="setFilter('fire')">Fire</button>
                <button class="filter-chip" data-filter="ems" onclick="setFilter('ems')">EMS</button>
                <button class="filter-chip" data-filter="dispatch" onclick="setFilter('dispatch')">Dispatch</button>
            </div>
            <div class="feed-list" id="feed-list"></div>
            <div class="now-playing" id="now-playing" style="display:none">
                <div class="now-playing-label">Now Playing</div>
                <div class="now-playing-title" id="np-title">--</div>
                <div class="viz-container" id="viz-container"></div>
                <div class="audio-controls">
                    <button class="audio-btn stop" onclick="stopAudio()">STOP</button>
                    <input type="range" class="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
                </div>
            </div>
        </div>
        <button class="sidebar-toggle" id="toggle-btn" onclick="toggleSidebar()">&#9776;</button>
        <div class="main">
            <div id="map"></div>
            <div class="top-bar">
                <button class="top-btn active" id="btn-map" onclick="setLayer('map')">Map</button>
                <button class="top-btn" id="btn-sat" onclick="setLayer('satellite')">Satellite</button>
            </div>
            <div class="info-panel" id="info-panel">
                <div class="info-header">
                    <h2 id="info-title">Feed Info</h2>
                    <button class="info-close" onclick="closeInfo()">&#10005;</button>
                </div>
                <div class="info-body" id="info-body"></div>
            </div>
        </div>
    </div>

let map, markers=[], audioEl, currentFeed=null, currentFilter='all';
function init(){
    document.getElementById('feed-count').textContent=feeds.length;
    map=L.map('map',{center:[39.5,-95.5],zoom:4,zoomControl:false});
    L.control.zoom({position:'bottomright'}).addTo(map);
    window.baseLayers={
        map:L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CARTO; OpenStreetMap'}),
        satellite:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Esri'})
    };
    baseLayers.map.addTo(map);
    setLayer('map');
    audioEl=document.getElementById('audio-player');
    audioEl.volume=0.8;
    audioEl.addEventListener('playing',onAudioPlay);
    audioEl.addEventListener('pause',onAudioStop);
    audioEl.addEventListener('error',onAudioError);
    renderFeeds();
    renderMarkers();
    setupViz();
}
function setLayer(name){
    document.getElementById('btn-map').classList.toggle('active',name==='map');
    document.getElementById('btn-sat').classList.toggle('active',name==='satellite');
    Object.values(baseLayers).forEach(l=>map.hasLayer(l)&&map.removeLayer(l));
    baseLayers[name].addTo(map);
}
function renderFeeds(){
    const list=document.getElementById('feed-list');let html='',lastState='';
    feeds.forEach(f=>{
        if(currentFilter!=='all'&&f.type!==currentFilter)return;
        if(f.state!==lastState){html+='<div class="feed-group-label">'+f.state+'</div>';lastState=f.state;}
        const isPlaying=currentFeed===f.id;
        html+='<div class="feed-item '+(isPlaying?'playing':'')+'" data-id="'+f.id+'" onclick="playFeed(''+f.id+'')">'+
            '<div class="feed-icon '+f.type+'">'+f.icon+'</div>'+
            '<div class="feed-info">'+
                '<div class="feed-name">'+f.name+'</div>'+
                '<div class="feed-meta">'+f.location+' · '+f.bitrate+'</div>'+
            '</div>'+
            '<div class="feed-status '+(isPlaying?'playing':'online')+'">'+(isPlaying?'LIVE':'ONLINE')+'</div>'+
        '</div>';
    });
    list.innerHTML=html;
}
function renderMarkers(){
    markers.forEach(m=>map.removeLayer(m));markers=[];
    feeds.forEach(f=>{
        const color=f.type==='police'?'#ef4444':f.type==='fire'?'#f97316':f.type==='ems'?'#22c55e':'#3b82f6';
        const m=L.circleMarker([f.lat,f.lon],{radius:6,fillColor:color,color:'#fff',weight:1.5,opacity:1,fillOpacity:0.85}).addTo(map);
        m.bindPopup('<strong>'+f.name+'</strong><br><span style="color:#aaa">'+f.location+'</span><br><button onclick="playFeed(''+f.id+'')" style="margin-top:8px;padding:6px 12px;background:'+color+';border:none;border-radius:6px;color:#fff;font-weight:600;cursor:pointer;font-size:0.75rem">PLAY</button>');
        m.on('click',()=>{showInfo(f);});
        markers.push(m);
    });
}
function playFeed(id){
    const feed=feeds.find(f=>f.id===id);if(!feed)return;
    if(currentFeed===id){stopAudio();return;}
    currentFeed=id;
    audioEl.src=feed.url;
    audioEl.load();
    const playPromise=audioEl.play();
    if(playPromise&&typeof playPromise.then==='function'){
        playPromise.then(()=>{
            document.getElementById('now-playing').style.display='block';
            document.getElementById('np-title').textContent=feed.name+' | '+feed.location;
            renderFeeds();renderMarkers();
        }).catch(e=>{
            console.error('Playback error:',e);
            document.getElementById('np-title').textContent='Error: click again to retry';
        });
    }
    showInfo(feed);
}
function stopAudio(){
    currentFeed=null;
    audioEl.pause();
    audioEl.src='';
    document.getElementById('now-playing').style.display='none';
    document.getElementById('np-title').textContent='--';
    renderFeeds();renderMarkers();
}
function onAudioPlay(){}
function onAudioStop(){}
function onAudioError(){
    document.getElementById('np-title').textContent='Stream unavailable';
}
function setVolume(v){audioEl&&(audioEl.volume=v/100);}
function toggleSidebar(){
    const sb=document.getElementById('sidebar'),btn=document.getElementById('toggle-btn');
    if(window.innerWidth<=768){
        sb.classList.toggle('mobile-hidden');sb.classList.toggle('mobile-visible');
    }else{
        sb.classList.toggle('hidden');btn.classList.toggle('collapsed');
    }
}
function setFilter(type){
    currentFilter=type;
    document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter===type));
    renderFeeds();
}
function filterFeeds(){
    const q=document.getElementById('feed-search').value.toLowerCase();
    document.querySelectorAll('.feed-item').forEach(el=>{
        const id=el.dataset.id;
        const feed=feeds.find(f=>f.id===id);
        const match=feed&&(feed.name.toLowerCase().includes(q)||feed.location.toLowerCase().includes(q)||feed.state.toLowerCase().includes(q));
        el.style.display=match?'':'none';
        if(el.previousElementSibling&&el.previousElementSibling.classList.contains('feed-group-label')){
            el.previousElementSibling.style.display=match?'':'none';
        }
    });
}
function showInfo(feed){
    document.getElementById('info-title').innerHTML='<span style="color:'+feed.color+'">'+feed.icon+'</span> '+feed.name;
    const rows=[
        ['Agency',feed.agency],['Location',feed.location],['State',feed.state],
        ['Type',feed.type.toUpperCase()],['Bitrate',feed.bitrate],['Format',feed.format]
    ];
    document.getElementById('info-body').innerHTML=rows.map(r=>'<div class="info-row"><span class="info-label">'+r[0]+'</span><span class="info-value">'+r[1]+'</span></div>').join('')+
    '<button class="play-btn" onclick="playFeed(''+feed.id+'')">PLAY FEED</button>';
    document.getElementById('info-panel').classList.add('visible');
}
function closeInfo(){document.getElementById('info-panel').classList.remove('visible');}
function setupViz(){
    const c=document.getElementById('viz-container');
    for(let i=0;i<30;i++){const b=document.createElement('div');b.className='viz-bar';b.style.height='4px';c.appendChild(b);}
    setInterval(()=>{
        if(audioEl&&currentFeed&&!audioEl.paused){
            Array.from(c.children).forEach(b=>{b.style.height=Math.max(4,Math.random()*60)+'px';});
        }else{
            Array.from(c.children).forEach(b=>{b.style.height='4px';});
        }
    },80);
}
window.addEventListener('resize',()=>{if(window.innerWidth>768){document.getElementById('sidebar').classList.remove('mobile-hidden','mobile-visible');}});
document.addEventListener('DOMContentLoaded',init);
</script>
