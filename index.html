<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Live — Public Safety Radio Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg: #07070d;
            --surface: #0f0f18;
            --surface-hover: #16162a;
            --border: #1e1e3e;
            --border-active: #33334d;
            --text: #e8e8f2;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent: #ef4444;
            --accent-dim: rgba(239, 68, 68, 0.1);
            --accent-glow: rgba(239, 68, 68, 0.3);
            --blue: #3b82f6;
            --blue-dim: rgba(59, 130, 246, 0.1);
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.1);
            --orange: #f97316;
            --orange-dim: rgba(249, 115, 22, 0.1);
            --font: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        .app { display: flex; height: 100vh; width: 100vw; }

        /* SIDEBAR */
        .sidebar {
            width: 380px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.hidden { transform: translateX(-100%); position: absolute; }
        .sidebar.mobile-hidden { transform: translateX(-100%); }
        .sidebar.mobile-visible { transform: translateX(0); position: fixed; height: 100vh; width: 85vw; max-width: 380px; }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
        }
        .sidebar-header p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--green);
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--green-dim);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .live-badge .pulse {
            width: 6px; height: 6px; border-radius: 50%; background: var(--green);
            animation: pulse-live 2s infinite;
        }
        @keyframes pulse-live {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .search-box {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            font-family: var(--font);
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute; left: 32px; top: 50%; transform: translateY(-50%);
            font-size: 0.9rem; color: var(--text-muted);
        }

        .filters {
            display: flex;
            gap: 6px;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .filter-chip:hover { border-color: var(--border-active); color: var(--text); }
        .filter-chip.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent);
        }

        .feed-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
        .feed-group-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 12px 8px 6px;
        }
        .feed-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 2px;
            border: 1px solid transparent;
        }
        .feed-item:hover { background: var(--surface-hover); border-color: var(--border); }
        .feed-item.active {
            background: var(--accent-dim);
            border-color: var(--accent);
        }
        .feed-item.playing {
            background: linear-gradient(135deg, var(--accent-dim), var(--blue-dim));
            border-color: var(--accent);
        }
        .feed-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; flex-shrink: 0;
            font-weight: 700;
            font-family: var(--font-mono);
            color: white;
        }
        .feed-icon.police { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .feed-icon.fire { background: rgba(249, 115, 22, 0.2); color: #f97316; }
        .feed-icon.ems { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .feed-icon.dispatch { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .feed-info { flex: 1; min-width: 0; }
        .feed-name { font-weight: 600; font-size: 0.88rem; }
        .feed-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .feed-status {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .feed-status.online {
            background: var(--green-dim);
            color: var(--green);
        }
        .feed-status.playing {
            background: var(--accent-dim);
            color: var(--accent);
            animation: pulse-live 2s infinite;
        }

        .now-playing {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: linear-gradient(135deg, var(--accent-dim), transparent);
        }
        .now-playing-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .now-playing-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .audio-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .audio-btn:hover { transform: scale(1.1); }
        .audio-btn.stop { background: var(--text-muted); }
        .viz-container {
            height: 70px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-top: 10px;
            padding: 5px 10px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            overflow: hidden;
        }
        .viz-bar {
            width: 6px;
            border-radius: 2px;
            background: linear-gradient(180deg, var(--accent), var(--orange));
            transition: height 0.05s ease-out;
            min-height: 2px;
            opacity: 0.85;
        }
        .volume-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .main { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; background: #0d1117; }

        .sidebar-toggle {
            position: absolute; left: 400px; top: 16px;
            z-index: 1001; width: 40px; height: 40px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; transition: left 0.25s;
        }
        .sidebar-toggle.collapsed { left: 16px; }

        .top-bar {
            position: absolute; top: 16px; right: 16px;
            z-index: 500; display: flex; gap: 6px;
        }
        .top-btn {
            padding: 8px 16px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 10px;
            color: var(--text-secondary); font-size: 0.8rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .top-btn:hover { border-color: var(--border-active); color: var(--text); }
        .top-btn.active {
            background: var(--accent-dim); border-color: var(--accent); color: var(--accent);
        }

        .info-panel {
            position: absolute; bottom: 16px; right: 16px;
            width: 360px; max-height: calc(100vh - 100px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; overflow: hidden; z-index: 500;
            backdrop-filter: blur(12px); display: none; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .info-panel.visible { display: flex; }
        .info-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: start; justify-content: space-between;
            background: linear-gradient(135deg, var(--accent-dim), transparent);
        }
        .info-header h2 {
            font-size: 1.1rem; font-weight: 700;
            display: flex; align-items: center;
            gap: 8px;
        }
        .info-close {
            background: none; border: none; color: var(--text-muted);
            font-size: 1.2rem; cursor: pointer; padding: 0 0 0 12px;
        }
        .info-body { overflow-y: auto; padding: 16px 20px; }
        .info-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-muted); }
        .info-value { font-weight: 600; font-family: var(--font-mono); }
        .play-btn {
            width: 100%; padding: 12px;
            background: var(--accent); border: none;
            border-radius: 10px; color: white;
            font-weight: 600; cursor: pointer;
            margin-top: 12px; transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.8rem;
        }
        .play-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .leaflet-popup-content-wrapper {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 12px !important;
            color: var(--text) !important;
            font-family: var(--font) !important;
        }
        .leaflet-popup-tip { background: var(--surface) !important; border: 1px solid var(--border) !important; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100vh; width: 85vw; max-width: 380px; }
            .sidebar-toggle { left: 16px !important; top: 16px; z-index: 1002; width: 44px; height: 44px; }
            .top-bar { top: auto; bottom: 16px; right: 50%; transform: translateX(50%); flex-wrap: wrap; justify-content: center; }
            .info-panel { width: calc(100% - 32px); left: 16px; right: 16px; bottom: 70px; max-height: 55vh; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Scanner Live</h1>
                <p>Public safety radio intelligence</p>
                <div class="live-badge"><div class="pulse"></div> Live Audio Feed</div>
            </div>

            <div class="search-box">
                <span class="search-icon">&#128269;</span>
                <input type="text" id="feed-search" placeholder="Search feeds by city, state..." oninput="filterFeeds()">
            </div>

            <div class="filters" id="filters">
                <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</button>
                <button class="filter-chip" data-filter="police" onclick="setFilter('police')">Police</button>
                <button class="filter-chip" data-filter="fire" onclick="setFilter('fire')">Fire</button>
                <button class="filter-chip" data-filter="ems" onclick="setFilter('ems')">EMS</button>
                <button class="filter-chip" data-filter="dispatch" onclick="setFilter('dispatch')">Dispatch</button>
            </div>

            <div class="feed-list" id="feed-list"></div>

            <div class="now-playing" id="now-playing" style="display:none">
                <div class="now-playing-label">Now Playing</div>
                <div class="now-playing-title" id="np-title">--</div>
                <div class="viz-container" id="viz-container">
                    <!-- Bars generated by JS -->
                </div>
                <div class="audio-controls">
                    <button class="audio-btn stop" onclick="stopAudio()">STOP</button>
                    <input type="range" class="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
                </div>
            </div>
        </div>

        <button class="sidebar-toggle" id="toggle-btn" onclick="toggleSidebar()">&#9776;</button>

        <div class="main">
            <div id="map"></div>

            <div class="top-bar">
                <button class="top-btn active" id="btn-map" onclick="setLayer('map')">Map</button>
                <button class="top-btn" id="btn-sat" onclick="setLayer('satellite')">Satellite</button>
            </div>

            <div class="info-panel" id="info-panel">
                <div class="info-header">
                    <h2 id="info-title">Feed Info</h2>
                    <button class="info-close" onclick="closeInfo()">&#10005;</button>
                </div>
                <div class="info-body" id="info-body"></div>
            </div>
        </div>
    </div>

    <audio id="audio-player" preload="none"></audio>

    <script>
        const feeds = [
            { id: 'new-haven', name: 'Greater New Haven Police', type: 'police', icon: 'PD', color: '#ef4444',
              agency: 'New Haven PD', location: 'Connecticut', state: 'CT',
              lat: 41.3258, lon: -72.9361,
              url: 'https://broadcastify.cdnstream1.com/8705',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'jefferson-ny', name: 'Jefferson County Police/Fire/EMS', type: 'dispatch', icon: 'DC', color: '#3b82f6',
              agency: 'Jefferson County', location: 'Watertown, NY', state: 'NY',
              lat: 44.0323, lon: -75.8826,
              url: 'https://broadcastify.cdnstream1.com/6007',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'madison-in', name: 'Madison County Sheriff/Fire/EMS', type: 'dispatch', icon: 'DC', color: '#3b82f6',
              agency: 'Madison County', location: 'Anderson, IN', state: 'IN',
              lat: 40.0541, lon: -85.6604,
              url: 'https://broadcastify.cdnstream1.com/24550',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'pittsburgh', name: 'Pittsburgh Police/Fire/EMS', type: 'dispatch', icon: 'DC', color: '#3b82f6',
              agency: 'Pittsburgh Public Safety', location: 'Pittsburgh, PA', state: 'PA',
              lat: 40.4742, lon: -79.9103,
              url: 'https://broadcastify.cdnstream1.com/21738',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'rivercom', name: 'Rivercom Chelan/Douglas Dispatch', type: 'dispatch', icon: 'DC', color: '#3b82f6',
              agency: 'Rivercom', location: 'Wenatchee, WA', state: 'WA',
              lat: 47.4453, lon: -120.3113,
              url: 'https://broadcastify.cdnstream1.com/24557',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'somafm-sf', name: 'San Francisco Police Scanner', type: 'police', icon: 'PD', color: '#ef4444',
              agency: 'San Francisco PD', location: 'San Francisco, CA', state: 'CA',
              lat: 37.8098, lon: -121.2863,
              url: 'https://ice6.somafm.com/scanner-128-mp3',
              status: 'online', bitrate: '128 kbps', format: 'MP3' },
            { id: 'tillamook', name: 'Tillamook County Police/EMS', type: 'ems', icon: 'EMS', color: '#22c55e',
              agency: 'Tillamook County', location: 'Tillamook, OR', state: 'OR',
              lat: 45.4596, lon: -123.8365,
              url: 'https://broadcastify.cdnstream1.com/16984',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'tucson', name: 'Tucson Police Dispatch', type: 'police', icon: 'PD', color: '#ef4444',
              agency: 'Tucson PD', location: 'Tucson, AZ', state: 'AZ',
              lat: 32.2220, lon: -110.9743,
              url: 'https://broadcastify.cdnstream1.com/22835',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'fairfax', name: 'Fairfax County Police/Fire/EMS', type: 'dispatch', icon: 'DC', color: '#3b82f6',
              agency: 'Fairfax County', location: 'Fairfax, VA', state: 'VA',
              lat: 38.8462, lon: -77.3064,
              url: 'https://broadcastify.cdnstream1.com/28326',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'east-rutherford', name: 'East Rutherford Police/Fire', type: 'fire', icon: 'FD', color: '#f97316',
              agency: 'East Rutherford FD', location: 'East Rutherford, NJ', state: 'NJ',
              lat: 40.8265, lon: -74.0970,
              url: 'https://broadcastify.cdnstream1.com/19129',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'pittsburgh-fire', name: 'Pittsburgh Fire Dispatch', type: 'fire', icon: 'FD', color: '#f97316',
              agency: 'Pittsburgh FD', location: 'Pittsburgh, PA', state: 'PA',
              lat: 40.4406, lon: -79.9959,
              url: 'https://broadcastify.cdnstream1.com/15309',
              status: 'online', bitrate: '16 kbps', format: 'MP3' },
            { id: 'phoenix', name: 'Phoenix Metro Fire', type: 'fire', icon: 'FD', color: '#f97316',
              agency: 'Phoenix FD', location: 'Phoenix, AZ', state: 'AZ',
              lat: 33.4484, lon: -112.0740,
              url: 'https://broadcastify.cdnstream1.com/1',
              status: 'online', bitrate: '32 kbps', format: 'MP3' },
            { id: 'bay-county', name: 'Bay County Scanner', type: 'dispatch', icon: 'DC', color: '#3b82f6',
              agency: 'Bay County', location: 'Panama City, FL', state: 'FL',
              lat: 30.1588, lon: -85.6602,
              url: 'http://feeds.baycountyscanner.org:8010/scanner',
              status: 'online', bitrate: '56 kbps', format: 'MP3' },
            { id: 'colton', name: 'Colton Police Scanner', type: 'police', icon: 'PD', color: '#ef4444',
              agency: 'Colton PD', location: 'Colton, UT', state: 'UT',
              lat: 40.2505, lon: -112.2855,
              url: 'http://64.77.247.181:50/stream',
              status: 'online', bitrate: '56 kbps', format: 'MP3' },
            { id: 'perth-fire', name: 'Perth Fire and Rescue', type: 'fire', icon: 'FD', color: '#f97316',
              agency: 'Perth FR', location: 'Perth, Australia', state: 'WA',
              lat: -31.9505, lon: 115.8605,
              url: 'https://stream.warsug.info/WARSUG',
              status: 'online', bitrate: '24 kbps', format: 'MP3' }
        ];

        const map = L.map('map', {
            center: [39.8283, -98.5795], zoom: 4,
            zoomControl: false, attributionControl: false
        });
        let baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO', subdomains: 'abcd', maxZoom: 19
        }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let markers = {}, currentFilter = 'all', activeFeed = null;
        let audioPlayer = document.getElementById('audio-player');
        let audioContext = null, analyser = null, source = null, dataArray = null;
        let vizAnimationId = null;
        const VIZ_BARS = 24;

        // Initialize visualizer bars
        function initVisualizer() {
            const container = document.getElementById('viz-container');
            container.innerHTML = '';
            for (let i = 0; i < VIZ_BARS; i++) {
                const bar = document.createElement('div');
                bar.className = 'viz-bar';
                bar.style.height = '2px';
                container.appendChild(bar);
            }
        }

        // Setup Web Audio API for visualizer
        function setupAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 64;
                analyser.smoothingTimeConstant = 0.8;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            if (!source) {
                source = audioContext.createMediaElementSource(audioPlayer);
                source.connect(analyser);
                analyser.connect(audioContext.destination);
            }
        }

        // Animate visualizer bars
        function animateVisualizer() {
            if (!analyser || audioPlayer.paused) {
                vizAnimationId = null;
                return;
            }
            analyser.getByteFrequencyData(dataArray);
            const bars = document.querySelectorAll('.viz-bar');
            const step = Math.floor(dataArray.length / VIZ_BARS);

            for (let i = 0; i < VIZ_BARS; i++) {
                const value = dataArray[i * step] || 0;
                const percent = (value / 255) * 100;
                const height = Math.max(2, Math.min(60, percent * 0.6));
                if (bars[i]) bars[i].style.height = height + 'px';
            }
            vizAnimationId = requestAnimationFrame(animateVisualizer);
        }

        // Cleanup audio nodes
        function cleanupAudioContext() {
            if (vizAnimationId) {
                cancelAnimationFrame(vizAnimationId);
                vizAnimationId = null;
            }
            if (source) {
                source.disconnect();
                source = null;
            }
            if (analyser) {
                analyser.disconnect();
                analyser = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            // Reset bars
            document.querySelectorAll('.viz-bar').forEach(bar => bar.style.height = '2px');
        }

        function initMarkers() {
            feeds.forEach(feed => {
                const marker = L.circleMarker([feed.lat, feed.lon], {
                    radius: 10, fillColor: feed.color, color: feed.color,
                    weight: 2, opacity: 0.9, fillOpacity: 0.4
                }).addTo(map);

                marker.bindPopup(`
                    <div style="min-width:200px;font-family:'Inter',sans-serif">
                        <h3 style="margin:0 0 6px;font-size:1rem;font-weight:700">${feed.name}</h3>
                        <p style="margin:0 0 4px;font-size:0.8rem;color:#9ca3af">${feed.agency}</p>
                        <p style="margin:0 0 4px;font-size:0.8rem;color:#6b7280">${feed.location}</p>
                        <p style="margin:0;font-size:0.8rem">Status: <span style="color:#22c55e;font-weight:600">ONLINE</span></p>
                        <p style="margin:8px 0 0;font-size:0.8rem"><a href="#" onclick="playFeed('${feed.id}');return false;" style="color:#ef4444;font-weight:600;text-decoration:none">PLAY AUDIO →</a></p>
                    </div>
                `, { offset: [0, -10] });

                marker.on('click', () => showFeedInfo(feed.id));
                markers[feed.id] = marker;
            });
        }

        function renderFeeds() {
            const list = document.getElementById('feed-list');
            const search = document.getElementById('feed-search').value.toLowerCase();
            list.innerHTML = '';

            const filtered = feeds.filter(f => {
                const matchesSearch = f.name.toLowerCase().includes(search) ||
                    f.location.toLowerCase().includes(search) ||
                    f.state.toLowerCase().includes(search);
                const matchesFilter = currentFilter === 'all' || f.type === currentFilter;
                return matchesSearch && matchesFilter;
            });

            const groups = {};
            filtered.forEach(f => {
                if (!groups[f.type]) groups[f.type] = [];
                groups[f.type].push(f);
            });

            const labels = { police: 'Police', fire: 'Fire & Rescue', ems: 'EMS', dispatch: 'Dispatch Centers' };

            Object.entries(groups).forEach(([type, items]) => {
                const label = document.createElement('div');
                label.className = 'feed-group-label';
                label.textContent = labels[type] || type;
                list.appendChild(label);

                items.forEach(feed => {
                    const item = document.createElement('div');
                    item.className = 'feed-item' + (activeFeed === feed.id ? ' playing' : '');
                    item.onclick = () => { map.setView([feed.lat, feed.lon], 6); playFeed(feed.id); };

                    item.innerHTML = `
                        <div class="feed-icon ${feed.type}" style="background:${feed.color}20;color:${feed.color}">${feed.icon}</div>
                        <div class="feed-info">
                            <div class="feed-name">${feed.name}</div>
                            <div class="feed-meta">${feed.location} / ${feed.bitrate}</div>
                        </div>
                        <div class="feed-status ${activeFeed === feed.id ? 'playing' : 'online'}">${activeFeed === feed.id ? 'PLAYING' : 'ONLINE'}</div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        function filterFeeds() { renderFeeds(); }
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === filter));
            renderFeeds();
        }

        function playFeed(id) {
            const feed = feeds.find(f => f.id === id);
            if (!feed) return;

            if (activeFeed && activeFeed !== id) {
                audioPlayer.pause();
                audioPlayer.src = '';
                cleanupAudioContext();
            }

            activeFeed = id;
            audioPlayer.src = feed.url;
            audioPlayer.volume = 0.8;
            audioPlayer.play().then(() => {
                setupAudioContext();
                if (!vizAnimationId) animateVisualizer();
            }).catch(e => console.log('Audio play failed:', e));

            document.getElementById('now-playing').style.display = 'block';
            document.getElementById('np-title').textContent = feed.name;
            renderFeeds();
            showFeedInfo(id);
        }

        function stopAudio() {
            audioPlayer.pause();
            audioPlayer.src = '';
            cleanupAudioContext();
            activeFeed = null;
            document.getElementById('now-playing').style.display = 'none';
            renderFeeds();
        }

        function setVolume(val) {
            audioPlayer.volume = val / 100;
        }

        function showFeedInfo(id) {
            const feed = feeds.find(f => f.id === id);
            if (!feed) return;

            document.getElementById('info-panel').classList.add('visible');
            document.getElementById('info-title').innerHTML = `${feed.name}`;
            document.getElementById('info-body').innerHTML = `
                <div class="info-row"><span class="info-label">Agency</span><span class="info-value">${feed.agency}</span></div>
                <div class="info-row"><span class="info-label">Location</span><span class="info-value">${feed.location}</span></div>
                <div class="info-row"><span class="info-label">State</span><span class="info-value">${feed.state}</span></div>
                <div class="info-row"><span class="info-label">Type</span><span class="info-value">${feed.type.toUpperCase()}</span></div>
                <div class="info-row"><span class="info-label">Coordinates</span><span class="info-value">${feed.lat}, ${feed.lon}</span></div>
                <div class="info-row"><span class="info-label">Bitrate</span><span class="info-value">${feed.bitrate}</span></div>
                <div class="info-row"><span class="info-label">Format</span><span class="info-value">${feed.format}</span></div>
                <div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:var(--green)">ONLINE</span></div>
                <button class="play-btn" onclick="playFeed('${feed.id}')">${activeFeed === feed.id ? 'Now Playing' : 'Play Live Audio'}</button>
            `;
        }

        function closeInfo() {
            document.getElementById('info-panel').classList.remove('visible');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('toggle-btn');
            if (window.innerWidth <= 768) {
                if (sidebar.classList.contains('mobile-visible')) {
                    sidebar.classList.remove('mobile-visible');
                    sidebar.classList.add('mobile-hidden');
                } else {
                    sidebar.classList.remove('mobile-hidden');
                    sidebar.classList.add('mobile-visible');
                }
            } else {
                sidebar.classList.toggle('hidden');
            }
            btn.classList.toggle('collapsed');
        }

        function setLayer(layer) {
            document.querySelectorAll('.top-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${layer}`).classList.add('active');

            if (layer === 'satellite') {
                map.removeLayer(baseLayer);
                baseLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    attribution: '&copy; Esri'
                }).addTo(map);
            } else {
                map.removeLayer(baseLayer);
                baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CARTO', subdomains: 'abcd', maxZoom: 19
                }).addTo(map);
            }
        }

        function handleResize() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('mobile-hidden');
            } else {
                document.getElementById('sidebar').classList.remove('mobile-hidden', 'mobile-visible');
            }
        }
        window.addEventListener('resize', handleResize);

        let touchStartX = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
        document.addEventListener('touchend', e => {
            const diff = e.changedTouches[0].clientX - touchStartX;
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768) {
                if (diff > 80 && touchStartX < 50) {
                    sidebar.classList.remove('mobile-hidden');
                    sidebar.classList.add('mobile-visible');
                } else if (diff < -80) {
                    sidebar.classList.remove('mobile-visible');
                    sidebar.classList.add('mobile-hidden');
                }
            }
        });

        initMarkers();
        initVisualizer();
        renderFeeds();
        handleResize();
    </script>
</body>
</html>
